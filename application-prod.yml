spring:
  application:
    name: movie-booking-app
  
  datasource:
    # ⚠️ 将以下占位符替换为实际的 RDS 信息
    # RDS 端点：在 AWS RDS 控制台获取
    # 例如：movie-booking-db.c9akciq32.us-east-1.rds.amazonaws.com
    url: jdbc:mysql://RDS_ENDPOINT_HERE:3306/movie_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false
    
    # RDS Master 用户名（默认 admin）
    username: admin
    
    # ⚠️ RDS Master 密码（创建 RDS 时设置）
    password: RDS_PASSWORD_HERE
    
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    hikari:
      # 连接池最大连接数
      maximum-pool-size: 20
      # 连接池最小空闲连接数
      minimum-idle: 5
      # 连接超时（毫秒）
      connection-timeout: 30000
      # 空闲连接超时
      idle-timeout: 600000
      # 最大生命周期（毫秒，30分钟）
      max-lifetime: 1800000
      # 自动提交
      auto-commit: true
  
  # JPA 和 Hibernate 配置
  jpa:
    hibernate:
      # update: JPA 自动更新表结构
      # validate: 只验证表结构
      # create-drop: 每次启动时重建表（不要在生产用！）
      ddl-auto: update
    
    properties:
      hibernate:
        # MySQL 8.0+ 方言
        dialect: org.hibernate.dialect.MySQL8Dialect
        # 格式化 SQL（生产禁用，性能）
        format_sql: false
        # 打印 SQL（生产禁用）
        show-sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
          use_scrollable_resultset: true
        use_national_character_variations: true
    
    open-in-view: false
    show-sql: false
  
  # SQL 初始化配置
  sql:
    init:
      encoding: utf-8
      mode: always
      data-locations: classpath:aws_database_init.sql
  
  # Redis 配置（如果使用，取消注释）
  redis:
    host: localhost
    port: 6379
    timeout: 2000
    jedis:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

# 服务器配置
server:
  port: 8080
  
  # HTTP 压缩
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  
  # Servlet 配置
  servlet:
    context-path: /
    session:
      timeout: 30m
  
  # Tomcat 配置
  tomcat:
    # 最大线程数（根据 EC2 实例大小调整）
    max-threads: 200
    # 最小线程数
    min-spare-threads: 10
    # 最大连接数
    max-connections: 10000
    # 连接超时（毫秒）
    connection-timeout: 20000
    # 请求头最大大小
    max-http-header-size: 8192
    # URI 编码
    uri-encoding: UTF-8

# JWT 配置
jwt:
  # ⚠️ 生产环境强烈建议修改此密钥！
  # 最少 256 位（32 字节）的随机字符串
  # 可用 OpenSSL 生成：openssl rand -base64 32
  secret: movie-booking-secret-key-change-in-production-environment-please-use-strong-key-at-least-256-bits
  
  # 过期时间（毫秒）：86400000 = 24小时
  expiration: 86400000

# 日志配置
logging:
  level:
    # 根日志级别
    root: INFO
    # 应用代码日志级别
    com.moviebooking: INFO
    # Spring Web 日志
    org.springframework.web: WARN
    # Spring Security 日志
    org.springframework.security: WARN
    # Hibernate 日志
    org.hibernate: WARN
    # Hibernate SQL 日志（生产禁用）
    org.hibernate.SQL: WARN
  
  # 日志文件配置
  file:
    name: /var/log/movie-booking/application.log
    max-size: 10MB
    max-history: 30
  
  pattern:
    # 日志格式
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用监控端点配置（生产环境仅向内部开放）
management:
  endpoints:
    web:
      # 暴露的端点
      exposure:
        include: health,info,metrics
      base-path: /actuator
  
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
  
  metrics:
    export:
      simple:
        enabled: true

# Spring Boot 应用配置
spring.application.version: 1.0.0
spring.application.environment: production
