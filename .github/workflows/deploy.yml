name: Deploy Spring Boot Docker Image to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./movie-booking-backend
          file: ./deploy/Dockerfile
          push: true
          tags: ghcr.io/a124144893-ai/movie-booking-app:latest

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Ensure deploy directories exist on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
              mkdir -p /home/ec2-user/ykm/web_files/nginx
            "

      - name: Upload Docker Compose files to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ./deploy/docker-compose.yml \
            ./deploy/.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/ykm/web_files/

      - name: Upload Nginx config to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ./deploy/nginx/default.conf \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/ykm/web_files/nginx/default.conf

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
              cd /home/ec2-user/ykm/web_files && \
              echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u a124144893-ai --password-stdin && \
              docker pull ghcr.io/a124144893-ai/movie-booking-app:latest && \
              docker compose up -d && \
              docker compose ps
            "

      - name: Health check with retry
        run: |
          for i in {1..12}; do
            echo "Health check attempt $i..."
            if curl -f -I http://${{ secrets.EC2_HOST }}; then
              echo "Application is healthy."
              exit 0
            fi
            echo "Application not ready yet, wait 5 seconds..."
            sleep 5
          done
          echo "Health check failed after multiple attempts."
          exit 1
