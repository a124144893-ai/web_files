name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-connect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Show repository structure
        run: |
          pwd
          ls -lah
          find . -maxdepth 3 -name "pom.xml"

      - name: Build with Maven
        working-directory: ./movie-booking-backend
        run: mvn clean package -DskipTests

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            echo 'connected successfully';
            pwd;
            ls -lah /home/ec2-user/ykm/web_files
          "
