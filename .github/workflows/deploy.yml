name: Deploy Spring Boot with Docker Compose to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven
        working-directory: ./movie-booking-backend
        run: mvn clean package -DskipTests

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Ensure deploy directories exist on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
              mkdir -p /home/ec2-user/ykm/web_files/nginx
            "

      - name: Upload JAR to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ./movie-booking-backend/target/movie-booking-app-1.0.0.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/ykm/web_files/movie-booking-app-1.0.0.jar

      - name: Upload Docker Compose files to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ./deploy/docker-compose.yml \
            ./deploy/Dockerfile \
            ./deploy/.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/ykm/web_files/

      - name: Upload Nginx config to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ./nginx/default.conf \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/ykm/web_files/nginx/default.conf

      - name: Deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
              cd /home/ec2-user/ykm/web_files && \
              docker compose down && \
              docker compose up -d --build && \
              docker compose ps
            "

      - name: Health check with retry
        run: |
          for i in {1..12}; do
            echo "Health check attempt $i..."
            if curl -f -I http://${{ secrets.EC2_HOST }}; then
              echo "Application is healthy."
              exit 0
            fi
            echo "Application not ready yet, wait 5 seconds..."
            sleep 5
          done
          echo "Health check failed after multiple attempts."
          exit 1
