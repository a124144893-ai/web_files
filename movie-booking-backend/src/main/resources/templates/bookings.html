<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 电影预约APP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.08);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .top-bar a, .top-bar button {
            padding: 10px 16px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .booking-card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid #e8eaf6;
            border-radius: 12px;
            background: #ffffff;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.05);
        }
        .booking-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .booking-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .booking-title {
            margin: 0;
            font-size: 20px;
            color: #222;
        }
        .booking-status {
            padding: 8px 14px;
            border-radius: 20px;
            background-color: #f0f0f0;
            color: #555;
            font-weight: 600;
            font-size: 13px;
        }
        .detail-link {
            display: inline-block;
            padding: 10px 16px;
            background-color: #f0f0f0;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .detail-link:hover {
            background-color: #e0e0e0;
        }
        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }
        .booking-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: #555;
        }
        .booking-item span:first-child {
            font-weight: 600;
            color: #333;
        }
        .detail-link {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }
        .empty-message {
            padding: 30px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div>
                <a href="/">首页</a>
                <a href="/profile">个人信息</a>
            </div>
            <button id="logoutButton">退出登录</button>
        </div>
        <h1>我的订单</h1>
        <div id="bookingContainer"></div>
    </div>

    <script th:inline="none">
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/';
        });

        function formatDate(dateString) {
            return dateString ? new Date(dateString).toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            }) : '-';
        }

        async function loadBookings() {
            try {
                const response = await fetch('/bookings/my?pageNum=1&pageSize=20', {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                if (!response.ok) {
                    throw new Error('无法加载预约记录');
                }
                const data = await response.json();
                const container = document.getElementById('bookingContainer');

                if (!data.content || data.content.length === 0) {
                    container.innerHTML = '<div class="empty-message">当前没有预约记录，快去预约喜欢的电影吧！</div>';
                    return;
                }

                container.innerHTML = data.content.map(booking => `
                    <div class="booking-card">
                        <div class="booking-header">
                            <div class="booking-title-row">
                                <h2 class="booking-title">${booking.movieTitle || '未知电影'}</h2>
                                <span class="booking-status">${booking.status || '未知状态'}</span>
                            </div>
                            <a class="detail-link" href="/movie?id=${booking.movieId}">查看电影详情</a>
                        </div>
                        <div class="booking-details">
                            <div class="booking-item"><span>放映时间</span><span>${formatDate(booking.showtimeStart)}</span></div>
                            <div class="booking-item"><span>影厅</span><span>${booking.cinemaHall || '-'}</span></div>
                            <div class="booking-item"><span>座位数量</span><span>${booking.seatCount || '-'}</span></div>
                            <div class="booking-item"><span>座位信息</span><span>${booking.seatNumbers || '-'}</span></div>
                            <div class="booking-item"><span>总价</span><span>${booking.totalPrice != null ? '¥' + booking.totalPrice.toFixed(2) : '-'}</span></div>
                            <div class="booking-item"><span>预约时间</span><span>${formatDate(booking.bookingTime)}</span></div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载预约记录失败:', error);
                document.getElementById('bookingContainer').innerHTML = '<div class="empty-message">加载预约记录失败，请稍后重试。</div>';
            }
        }

        loadBookings();
    </script>
</body>
</html>
