spring:
  application:
    name: movie-booking-app

  datasource:
    url: jdbc:mysql://localhost:3306/movie_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
          use_scrollable_resultset: true
        use_national_character_variations: true

    open-in-view: false
    show-sql: true

  sql:
    init:
      encoding: utf-8
      mode: never

server:
  port: 8080

  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

  servlet:
    context-path: /
    session:
      timeout: 30m

  tomcat:
    max-threads: 200
    min-spare-threads: 10
    max-connections: 10000
    connection-timeout: 20000
    max-http-header-size: 8192
    uri-encoding: UTF-8

jwt:
  secret: YDvmITz6uxaMW9uawXCwmartQlHeNkzB+7E3Wl1c6Jk=
  expiration: 86400000

logging:
  level:
    root: INFO
    com.moviebooking: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

  file:
    name: logs/application-local.log

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator

  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true

  metrics:
    export:
      simple:
        enabled: true

spring.application.version: 1.0.0
spring.application.environment: local