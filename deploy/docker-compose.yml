services:
  movie-booking-app:
    image: ${IMAGE_NAME}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    volumes:
      - ${CONFIG_FILE}:/app/application-prod.yml:ro
    command: ["--spring.profiles.active=prod", "--spring.config.location=/app/application-prod.yml"]
  nginx:
    image: nginx:latest
    container_name: movie-booking-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_CONTAINER_PORT}"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - movie-booking-app
